<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Helios Health</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .offline-icon {
            font-size: 6rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
        button {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0.5rem;
        }
        button:hover { transform: scale(1.05); background: linear-gradient(135deg, #0ea5e9, #0284c7); }
        .secondary-btn {
            background: transparent;
            border: 1px solid #475569;
        }
        .secondary-btn:hover { background: #1e293b; border-color: #64748b; }
        .offline-tips {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection<br>to access your health dashboard and medical records.</p>
        <button onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>
        <button class="secondary-btn" onclick="window.location.href='/index.html'">
            <i class="fas fa-home"></i> Go to Login
        </button>
        <div class="offline-tips">
            <i class="fas fa-lightbulb"></i> Tip: Previously viewed data may still be available offline.
        </div>
    </div>
</body>
</html>
